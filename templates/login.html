<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Flask Game Login Page</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="font-bold text-4xl text-center m-8">
      Форма для входа на платформу
      <a class="underline text-blue-600">рудзынг.рф</a>
    </h1>

    <section class="flex flex-col justify-center items-center">
      <form action="/login" method="post" class="flex flex-col gap-4 w-1/3">
        <label for="email" class="font-semibold">Email пользователя:</label>
        <input
          type="email"
          id="email"
          name="email"
          class="border border-gray-300 p-2 rounded"
          required
          placeholder="example@mail.ru"
        />

        <label for="password" class="font-semibold">Пароль:</label>
        <input
          type="password"
          id="password"
          name="password"
          class="border border-gray-300 p-2 rounded"
          required
          placeholder="Your password..."
        />

        <button
          type="submit"
          class="bg-green-500 text-white p-2 rounded hover:bg-green-600 transition cursor-pointer"
        >
          Войти
        </button>
      </form>

      {% if error %}
      <div class="mt-4">
        <h2 class="text-red-500 text-center">{{ error["message"] }}</h2>
      </div>
      {% endif %}
    </section>
  </body>
</html>
