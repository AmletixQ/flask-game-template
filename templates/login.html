{% extends "base.html" %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  /* Адаптация под размер телефона */
  h1 {
    font-size: 1.8rem !important;
    margin: 1rem !important;
  }
  
  form {
    width: 90% !important;
    max-width: 350px !important;
  }
  
  input, button {
    font-size: 16px !important; /* Предотвращает масштабирование на iPhone */
  }
  
  button {
    padding: 12px !important;
  }
</style>
{% endblock %}

{% block content %}
<h1 class="font-bold text-center m-4">
  Форма для входа на платформу
  <a class="underline text-blue-600 text-base block mt-2">рудзынг.рф</a>
</h1>

<section class="flex flex-col justify-center items-center px-4">
  <form action="/login" method="post" class="flex flex-col gap-4 w-full max-w-[350px]">
    <label for="email" class="font-semibold text-sm">Email пользователя:</label>
    <input 
      type="email" 
      id="email" 
      name="email" 
      class="border border-gray-300 p-3 rounded" 
      required 
      placeholder="example@mail.ru" 
    />

    <label for="password" class="font-semibold text-sm">Пароль:</label>
    <input 
      type="password" 
      id="password" 
      name="password" 
      class="border border-gray-300 p-3 rounded" 
      required 
      placeholder="Your password..." 
    />

    <button 
      type="submit" 
      class="bg-green-500 text-white p-3 rounded hover:bg-green-600 transition cursor-pointer font-semibold"
    >
      Войти
    </button>
  </form>

  {% if error %}
  <div class="mt-4">
    <h2 class="text-red-500 text-center text-sm">{{ error["message"] }}</h2>
  </div>
  {% endif %}
</section>
{% endblock %}
