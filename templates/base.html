<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=430, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>{% block title %} {% endblock %} - FlaskApp</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        width: 430px;
        height: 800px;
        margin: 0 auto;
        background: #f0f0f0;
        overflow: hidden;
      }

      body {
        width: 430px;
        height: 800px;
        margin: 0;
        padding: 10px;
        background: #fff;
        border: 3px solid #3b82f6;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      nav a {
        color: #d64161;
        font-size: 1.2em;
        margin-left: 10px;
        text-decoration: none;
      }

      nav {
        margin-bottom: 5px;
        flex-shrink: 0;
      }

      hr {
        margin: 5px 0;
        flex-shrink: 0;
      }

      .content {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 10px;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav>
      <a href="/">FlaskApp</a>
      <a href="#">About</a>
    </nav>
    <hr />
    <div class="content">{% block content %} {% endblock %}</div>
  </body>
</html>
